{% extends 'blog/base.html' %}

{% block content %}
<div class="container-fluid">
    <div class="row mt-3 mx-2">
            <div class="col-12 col-lg-8">
              <h1 class="mb-4">{{post.title}} <small class="text-muted" style="font-size:18px">({{post.category.name}})</small></h1>
              <p class="text-muted">Posted on {{post.created_at|date:"F j,Y"}}</p>
              <img src="{{post.img_url}}" class="img-fluid mb-4 rounded" alt="{{post.title}}">
              <p>{{post.content}}</p>
            </div> 
            <div class="col-12 col-lg-4">
              <div class="card mt-3 mt-lg-0">
                <div class="card-body">
                  <h5 class="card-title">Related Posts</h5>
                  <ul class="list-unstyled">
                    {% for related_post in related_posts %}
                    <li><a href="{% url 'blog:detail' slug=related_post.slug %}" class="text-decoration-none">{{related_post.title}}</a></li>
                    {% endfor %}
                  </ul>
                </div>
              </div>
            </div>
        </div>
    </div>
{% endblock %}
